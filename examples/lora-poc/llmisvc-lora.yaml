# LoRA POC: Qwen2.5-7B base model with two LoRA adapters
# - k8s-lora: Kubernetes QA specialist (rank=64)
# - finance-lora: Finance domain specialist (rank=16)
#
# NOTE: Uses VLLM_ADDITIONAL_ARGS for LoRA config. The LLMInferenceService CRD
# has a spec.model.lora.adapters field but the controller does not yet reconcile
# it into vLLM args. Once controller support lands, migrate to the native API.
#
# Test with:
#   curl "${SERVICE_URL}/v1/chat/completions" -H "Content-Type: application/json" \
#     -d '{"model": "Qwen/Qwen2.5-7B-Instruct", ...}'  # Base model
#   curl ... -d '{"model": "k8s-lora", ...}'             # Kubernetes adapter
#   curl ... -d '{"model": "finance-lora", ...}'          # Finance adapter
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen2-lora
spec:
  model:
    name: Qwen/Qwen2.5-7B-Instruct
    uri: hf://Qwen/Qwen2.5-7B-Instruct
  replicas: 2
  router:
    gateway: {}
    route: {}
    scheduler: {}
  template:
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
    containers:
    - name: main
      env:
        # Required so vLLM can download LoRA adapters from HuggingFace at startup.
        # For production, pre-download adapters to a PVC or bake them into the image.
        - name: HF_HUB_OFFLINE
          value: "false"
        - name: VLLM_ADDITIONAL_ARGS
          value: "--enable-lora --max-lora-rank=64 --max-loras=2 --max-cpu-loras=2 --lora-modules k8s-lora=cimendev/kubernetes-qa-qwen2.5-7b-lora finance-lora=Max1690/qwen2.5-7b-finance-lora"
      resources:
        limits:
          cpu: "4"
          memory: 32Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 16Gi
          nvidia.com/gpu: "1"
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
        initialDelaySeconds: 120
        periodSeconds: 30
        timeoutSeconds: 30
        failureThreshold: 5
