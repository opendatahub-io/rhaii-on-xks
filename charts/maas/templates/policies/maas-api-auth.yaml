apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: maas-api-auth
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-auth
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: maas-api-route
  rules:
    authentication:
{{- if .Values.azureAD.enabled }}
      azure-ad:
        jwt:
          issuerUrl: https://login.microsoftonline.com/{{ .Values.azureAD.tenantId }}/v2.0
          audiences:
            - {{ .Values.azureAD.clientId }}
{{- else }}
      # maas-api handles its own API key validation internally.
      # Route-level AuthPolicies generated by maas-controller enforce
      # per-model authentication. This policy allows traffic through
      # to maas-api which validates keys via its /internal/v1/api-keys endpoint.
      anonymous:
        anonymous: {}
{{- end }}
    response:
      success:
        headers:
          x-maas-username:
            plain:
              value: "true"
              selector: auth.identity.preferred_username
          x-maas-group:
            plain:
              value: "true"
              selector: auth.identity.groups
