{{- if .Values.postgresql.enabled }}
{{- if not .Values.postgresql.auth.existingSecret }}
{{- $password := .Values.postgresql.auth.password | default (randAlphaNum 24) }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  POSTGRESQL_USER: {{ .Values.postgresql.auth.username | default "maas" }}
  POSTGRESQL_PASSWORD: {{ $password }}
  POSTGRESQL_DATABASE: {{ .Values.postgresql.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  DB_CONNECTION_URL: "postgresql://{{ .Values.postgresql.auth.username | default "maas" }}:{{ $password }}@postgres.{{ include "maas.namespace" . }}.svc.cluster.local:5432/{{ .Values.postgresql.database }}?sslmode=disable"
{{- end }}
{{- end }}
