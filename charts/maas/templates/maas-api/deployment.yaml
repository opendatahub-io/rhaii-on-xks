apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-api
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
spec:
  replicas: {{ .Values.maasApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: maas-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maas-api
        app.kubernetes.io/component: api
        {{- include "maas.labels" . | nindent 8 }}
    spec:
      serviceAccountName: maas-api
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30
      containers:
      - name: maas-api
        image: "{{ .Values.maasApi.image.repository }}:{{ .Values.maasApi.image.tag }}"
        imagePullPolicy: {{ .Values.maasApi.image.pullPolicy }}
        ports:
        {{- if .Values.maasApi.tls.enabled }}
        - containerPort: 8443
          name: https
          protocol: TCP
        {{- else }}
        - containerPort: 8080
          name: http
          protocol: TCP
        {{- end }}
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SECURE
          value: {{ .Values.maasApi.tls.enabled | quote }}
        {{- if .Values.maasApi.tls.enabled }}
        - name: TLS_SELF_SIGNED
          value: "false"
        - name: TLS_CERT
          value: /etc/maas-api/tls/tls.crt
        - name: TLS_KEY
          value: /etc/maas-api/tls/tls.key
        {{- end }}
        - name: MAAS_SUBSCRIPTION_NAMESPACE
          value: {{ .Values.maasApi.subscriptionNamespace | quote }}
        - name: GATEWAY_NAMESPACE
          value: {{ include "maas.gateway.namespace" . }}
        - name: GATEWAY_NAME
          value: {{ include "maas.gateway.name" . }}
        - name: API_KEY_MAX_EXPIRATION_DAYS
          value: {{ .Values.maasApi.apiKeyMaxExpirationDays | quote }}
        {{- if .Values.postgresql.enabled }}
        - name: DB_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: maas-db-config
              key: DB_CONNECTION_URL
        {{- end }}
        resources:
          {{- toYaml .Values.maasApi.resources | nindent 10 }}
        {{- if .Values.maasApi.tls.enabled }}
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/maas-api/tls
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ if .Values.maasApi.tls.enabled }}https{{ else }}http{{ end }}
            {{- if .Values.maasApi.tls.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: {{ if .Values.maasApi.tls.enabled }}https{{ else }}http{{ end }}
            {{- if .Values.maasApi.tls.enabled }}
            scheme: HTTPS
            {{- end }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      {{- if .Values.maasApi.tls.enabled }}
      volumes:
      - name: tls-certs
        secret:
          secretName: maas-api-serving-cert
      {{- end }}
