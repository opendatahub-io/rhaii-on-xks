apiVersion: v1
kind: Service
metadata:
  name: maas-api
  namespace: {{ include "maas.namespace" . }}
  labels:
    {{- include "maas.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
spec:
  selector:
    app.kubernetes.io/name: maas-api
    app.kubernetes.io/component: api
  ports:
  {{- if .Values.maasApi.tls.enabled }}
  - name: https
    port: 8443
    targetPort: https
    protocol: TCP
  {{- else }}
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  {{- end }}
  type: ClusterIP
